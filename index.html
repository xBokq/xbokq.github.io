<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>twoja_nazwa.lol</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@500;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #2a1b4a 0%, #0f0a1f 60%, #05050f 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Kosmiczne tło + mgławica */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4') center/cover no-repeat;
            opacity: 0.35;
            z-index: -2;
            animation: nebula 140s linear infinite;
        }

        @keyframes nebula {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* Animowane gwiazdy */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            z-index: -1;
            opacity: 0.6;
            animation: moveStars 160s linear infinite;
        }

        @keyframes moveStars {
            from { background-position: 0 0; }
            to { background-position: 1200px 1200px; }
        }

        /* Główny kontener - fioletowy glassmorphism */
        .container {
            background: rgba(40, 20, 80, 0.25);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(180, 100, 255, 0.4);
            padding: 45px 35px;
            border-radius: 24px;
            text-align: center;
            width: 360px;
            box-shadow: 
                0 0 40px rgba(180, 100, 255, 0.5),
                0 8px 32px rgba(0, 0, 0, 0.7);
        }

        .profile-img {
            width: 115px;
            height: 115px;
            border-radius: 50%;
            border: 4px solid #b464ff;
            margin-bottom: 20px;
            box-shadow: 0 0 35px #b464ff,
                        0 0 60px rgba(0, 245, 255, 0.4);
            transition: all 0.4s ease;
        }

        .profile-img:hover {
            transform: scale(1.12) rotate(8deg);
            box-shadow: 0 0 50px #b464ff,
                        0 0 80px rgba(0, 245, 255, 0.6);
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px;
            margin: 10px 0 8px;
            letter-spacing: 1.5px;
            background: linear-gradient(90deg, #ffffff, #c084fc, #67e8f9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #d1c4ff;
            font-size: 15px;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link {
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.08);
            padding: 15px;
            border-radius: 14px;
            transition: all 0.3s ease;
            font-weight: 600;
            border: 1px solid rgba(180, 100, 255, 0.3);
        }

        .link:hover {
            background: rgba(180, 100, 255, 0.25);
            border-color: #b464ff;
            transform: translateY(-4px);
            box-shadow: 0 0 20px rgba(180, 100, 255, 0.6);
        }

        /* Kontrolka muzyki */
        .music-control {
            margin-top: 35px;
            padding: 12px 28px;
            background: rgba(30, 15, 70, 0.6);
            border: 1px solid rgba(180, 100, 255, 0.5);
            border-radius: 9999px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .music-control:hover {
            background: rgba(180, 100, 255, 0.3);
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="container">
        <!-- Zmień na swoje zdjęcie -->
        <img src="https://via.placeholder.com/115" alt="Avatar" class="profile-img">

        <h1>Twój Nick</h1>
        <p>Eksplorator cyfrowego kosmosu 🌌<br>Tu zawsze leci zajebiscie</p>

        <div class="links">
            <a href="https://discord.gg/TWOJ_LINK" target="_blank" class="link">DISCORD</a>
            <a href="https://youtube.com/@TWÓJ_KANAŁ" target="_blank" class="link">YOUTUBE</a>
            <a href="https://instagram.com/TWÓJ_PROFIL" target="_blank" class="link">INSTAGRAM</a>
            <a href="https://tiktok.com/@TWÓJ_PROFIL" target="_blank" class="link">TIKTOK</a>
            <!-- dodaj kolejne linki jeśli chcesz -->
        </div>

        <div onclick="toggleMusic()" class="music-control">
            🎵 <span id="musicText">spazma - ZAJE*ISCIE leci w tle</span>
        </div>
    </div>

    <!-- Muzyka: spazma - ZAJE*ISCIE -->
    <iframe id="youtubePlayer" width="1" height="1" 
        src="https://www.youtube.com/embed/1grl9orkU88?autoplay=1&loop=1&playlist=1grl9orkU88&mute=1" 
        frameborder="0" allow="autoplay" style="display:none;"></iframe>

    <script>
        let isPlaying = true;
        const player = document.getElementById('youtubePlayer');
        const musicText = document.getElementById('musicText');

        function toggleMusic() {
            isPlaying = !isPlaying;
            if (isPlaying) {
                player.src = "https://www.youtube.com/watch?v=KERqIbo-k_A&list=RDKERqIbo-k_A&start_radio=1";
                musicText.textContent = "spazma - ZAJE*ISCIE leci w tle";
            } else {
                player.src = "https://www.youtube.com/watch?v=KERqIbo-k_A&list=RDKERqIbo-k_A&start_radio=1";
                musicText.textContent = "Muzyka zatrzymana";
            }
        }

        // Autostart
        window.onload = () => {
            setTimeout(() => {
                player.src = "https://www.youtube.com/watch?v=KERqIbo-k_A&list=RDKERqIbo-k_A&start_radio=1";
            }, 1200);
        };
    </script>
</body>
</html>
