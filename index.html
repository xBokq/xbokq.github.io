<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xBokq.wav</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@500;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #2a1b4a 0%, #0f0a1f 60%, #05050f 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4') center/cover no-repeat;
            opacity: 0.35;
            z-index: -2;
            animation: nebula 140s linear infinite;
        }

        @keyframes nebula {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            z-index: -1;
            opacity: 0.6;
            animation: moveStars 160s linear infinite;
        }

        @keyframes moveStars {
            from { background-position: 0 0; }
            to { background-position: 1200px 1200px; }
        }

        .container {
            background: rgba(40, 20, 80, 0.25);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(180, 100, 255, 0.4);
            padding: 45px 35px;
            border-radius: 24px;
            text-align: center;
            width: 360px;
            box-shadow: 0 0 40px rgba(180, 100, 255, 0.5), 0 8px 32px rgba(0, 0, 0, 0.7);
        }

        .profile-img {
            width: 115px;
            height: 115px;
            border-radius: 50%;
            border: 4px solid #b464ff;
            margin-bottom: 20px;
            box-shadow: 0 0 35px #b464ff, 0 0 60px rgba(0, 245, 255, 0.4);
            transition: all 0.4s ease;
        }

        .profile-img:hover {
            transform: scale(1.12) rotate(8deg);
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px;
            margin: 10px 0 8px;
            letter-spacing: 1.5px;
            background: linear-gradient(90deg, #ffffff, #c084fc, #67e8f9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #d1c4ff;
            font-size: 15px;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link {
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.08);
            padding: 15px;
            border-radius: 14px;
            transition: all 0.3s ease;
            font-weight: 600;
            border: 1px solid rgba(180, 100, 255, 0.3);
        }

        .link:hover {
            background: rgba(180, 100, 255, 0.25);
            border-color: #b464ff;
            transform: translateY(-4px);
        }

        .music-control {
            margin-top: 35px;
            padding: 12px 28px;
            background: rgba(30, 15, 70, 0.6);
            border: 1px solid rgba(180, 100, 255, 0.5);
            border-radius: 9999px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .music-control:hover {
            background: rgba(180, 100, 255, 0.3);
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="container">
        <img src="https://cdn.discordapp.com/attachments/1483117141761982527/1486456995002187866/image.png?ex=69c59274&is=69c440f4&hm=6c5b56ec7eb0a4d9669fdd0adae401b1414e058654c1af4b2b0877c551f36dbb" alt="Avatar" class="profile-img"> <!-- zmień na swoje -->

        <h1>B᷈o᷈k᷈q᷈.wav</h1>
        <p>Eksplorator cyfrowego kosmosu 🌌</p>

        <div class="links">
            <a href="https://discord.gg/TWOJ_LINK" target="_blank" class="link">DISCORD</a>
            <a href="https://youtube.com/@TWÓJ_KANAŁ" target="_blank" class="link">YOUTUBE</a>
            <a href="https://instagram.com/TWÓJ_PROFIL" target="_blank" class="link">INSTAGRAM</a>
            <a href="https://tiktok.com/@TWÓJ_PROFIL" target="_blank" class="link">TIKTOK</a>
        </div>

        <div onclick="toggleMusic()" class="music-control">
            🎵 <span id="musicText">spazma - ZAJEBISCIE leci w tle</span>
        </div>
    </div>

    <!-- Lokalna muzyka - ZMIENIAJ TYLKO ŚCIEŻKĘ JEŚLI PLIK JEST W PODFOLDERZE -->
    <audio id="bgMusic" loop>
        <source src="zajebiscie.mp3" type="audio/mpeg">
        Twój przeglądarka nie obsługuje audio.
    </audio>

    <script>
        const audio = document.getElementById('bgMusic');
        const musicText = document.getElementById('musicText');
        let isPlaying = true;

        function toggleMusic() {
            if (isPlaying) {
                audio.pause();
                musicText.textContent = "Muzyka zatrzymana";
            } else {
                audio.play();
                musicText.textContent = "spazma - ZAJEBISCIE leci w tle";
            }
            isPlaying = !isPlaying;
        }

        // Autostart (działa znacznie lepiej niż YouTube)
        window.addEventListener('load', () => {
            audio.volume = 0.5;   // możesz zmienić głośność 0.0 - 1.0
            audio.play().catch(() => {
                // Jeśli przeglądarka zablokuje autoplay, przycisk nadal działa
                console.log("Autoplay zablokowany – kliknij przycisk muzyki");
            });
        });
    </script>
</body>
</html>
